name: Merge provider submissions

on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: "Submission ID that triggered the merge"
        required: false
        type: string
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: provider-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout provider repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node for Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install -g wrangler@4.100.0

      - name: Merge accepted Cloudflare submissions
        env:
          STEAMIDRA_ADMIN_TOKEN: ${{ secrets.STEAMIDRA_ADMIN_TOKEN }}
        run: |
          python .github/scripts/merge_accepted_from_worker.py

      - name: Commit provider changes
        run: |
          git config user.name "SteaMidra Provider Bot"
          git config user.email "actions@users.noreply.github.com"

          git add fallback_depotkeys.json merged_submission_ids.json

          if git diff --cached --quiet; then
            echo "No provider changes to commit."
          else
            git commit -m "Merge accepted provider submissions"
            git push
          fi

      - name: Upload updated provider to Cloudflare R2 fallback
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 object put steam-depot-fallback/fallback_depotkeys.json \
            --file fallback_depotkeys.json \
            --content-type "application/json; charset=utf-8" \
            --remote
